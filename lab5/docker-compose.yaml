services:
  redis:
    image: redis:7-alpine
    container_name: recipe-manager-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  recipe-manager:
    build: .
    container_name: recipe-manager-api
    ports:
      - "8080:8080"
    environment:
      - REDIS_URI=tcp://redis:6379
    depends_on:
      redis:
        condition: service_healthy
